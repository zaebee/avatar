on:
  push:
    - workflows: [deploy-yandex]
      filter:
        branches: [main]
        paths: [terraform/**, cloud-function/**, asi-one-worker/**]

workflows:
  deploy-yandex:
    tasks:
      - terraform-deploy

tasks:
  - name: terraform-deploy
    cubes:
      - name: deploy-all
        image: docker.io/library/ubuntu:22.04
        script:
          - export PATH="/usr/local/bin:$PATH"
          - apt-get update && apt-get install -y curl wget git unzip python3 zip
          - git clone https://github.com/zaebee/avatar.git /app
          - curl -O https://storage.yandexcloud.net/yandexcloud-yc/release/yc_linux_amd64.tar.gz
          - tar -xzf yc_linux_amd64.tar.gz
          - install yc /usr/local/bin/yc
          - yc version
          - wget -q -O /tmp/terraform.zip https://mirror.selectel.ru/3rd-party/hashicorp-releases/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
          - unzip -o /tmp/terraform.zip -d /tmp
          - install -m 755 /tmp/terraform /usr/local/bin/terraform
          - terraform version
          - cd /app/cloud-function && zip -r function.zip . -x "*.pyc" "__pycache__/*"
          - cd /app/asi-one-worker && zip -r function.zip . -x "*.pyc" "__pycache__/*"
          - cd /app && mv cloud-function/function.zip terraform/ && mv asi-one-worker/function.zip terraform/
          - cd /app/terraform && terraform init
          - cd /app/terraform && terraform apply -auto-approve -var "token=${YC_TOKEN}" -var "imap_password=${IMAP_PASSWORD}" -var "shared_secret=${SHARED_SECRET}" -var "asi_one_key=${ASI_ONE_KEY}"