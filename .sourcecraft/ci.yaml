on:
  push:
    - workflows: [deploy-yandex]
      filter:
        branches: [main]
        paths: [terraform/**, cloud-function/**, asi-one-worker/**]

workflows:
  deploy-yandex:
    tasks:
      - terraform-deploy

tasks:
  - name: terraform-deploy
    cubes:
      - name: setup-yc-and-terraform
        image: docker.io/library/ubuntu:22.04
        script:
          - export PATH="/usr/local/bin:$PATH"
          - apt-get update && apt-get install -y curl wget git unzip python3
          - curl -O https://storage.yandexcloud.net/yandexcloud-yc/release/yc_linux_amd64.tar.gz
          - tar -xzf yc_linux_amd64.tar.gz
          - install yc /usr/local/bin/yc
          - yc version
          - curl -sL -o /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
          - file /tmp/terraform.zip
          - if file /tmp/terraform.zip | grep -q "HTML"; then cat /tmp/terraform.zip | head -5; else unzip -o -q /tmp/terraform.zip -d /usr/local/bin/ && terraform version; fi

      - name: configure-yc
        script:
          - export PATH="/usr/local/bin:$PATH"
          - yc config set token ${YC_TOKEN}
          - yc config set folder-id ${YC_FOLDER_ID}
          - yc config set cloud-id ${YC_CLOUD_ID}
          - yc config list

      - name: create-function-packages
        script:
          - cd cloud-function && zip -r function.zip . -x "*.pyc" "__pycache__/*"
          - cd ../asi-one-worker && zip -r function.zip . -x "*.pyc" "__pycache__/*"
          - mv cloud-function/function.zip terraform/
          - mv asi-one-worker/function.zip terraform/

      - name: terraform-init
        script:
          - cd terraform && /usr/local/bin/terraform init

      - name: terraform-apply
        script:
          - cd terraform && /usr/local/bin/terraform apply -auto-approve -var "token=${YC_TOKEN}" -var "imap_password=${IMAP_PASSWORD}" -var "shared_secret=${SHARED_SECRET}" -var "asi_one_key=${ASI_ONE_KEY}"