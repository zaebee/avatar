on:
  push:
    - workflows: [deploy-yandex]
      filter:
        branches: [main]
        paths: [terraform/**, cloud-function/**, asi-one-worker/**]

workflows:
  deploy-yandex:
    tasks:
      - terraform-deploy

tasks:
  - name: terraform-deploy
    cubes:
      - name: deploy-all
        image: docker.io/library/ubuntu:22.04
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          SHARED_SECRET: ${{ secrets.SHARED_SECRET }}
          ASI_ONE_KEY: ${{ secrets.ASI_ONE_KEY }}
        script:
          - export PATH="/usr/local/bin:$PATH"
          - test -n "$YC_SERVICE_ACCOUNT_KEY" && echo "SA_KEY set" || echo "SA_KEY empty"
          - test -n "$IMAP_PASSWORD" && echo "IMAP_PASSWORD set" || echo "IMAP_PASSWORD empty"
          - test -n "$SHARED_SECRET" && echo "SHARED_SECRET set" || echo "SHARED_SECRET empty"
          - test -n "$ASI_ONE_KEY" && echo "ASI_ONE_KEY set" || echo "ASI_ONE_KEY empty"
          - test -n "$YC_SERVICE_ACCOUNT_KEY" && echo "$YC_SERVICE_ACCOUNT_KEY" | base64 -d > /app/authorized_key.json
          - apt-get update && apt-get install -y curl wget git unzip python3 zip
          - git clone https://github.com/zaebee/avatar.git /app
          - |
            cat > /root/.terraformrc << 'ENDOFFILE'
            provider_installation {
              network_mirror {
                url = "https://terraform-mirror.yandexcloud.net/"
                include = ["registry.terraform.io/*/*"]
              }
              direct {
                exclude = ["registry.terraform.io/*/*"]
              }
            }
            ENDOFFILE
          - export TF_CLI_CONFIG=/root/.terraformrc
          - curl -O https://storage.yandexcloud.net/yandexcloud-yc/release/yc_linux_amd64.tar.gz
          - tar -xzf yc_linux_amd64.tar.gz
          - install yc /usr/local/bin/yc
          - yc version
          - wget -q -O /tmp/terraform.zip https://mirror.selectel.ru/3rd-party/hashicorp-releases/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
          - unzip -o /tmp/terraform.zip -d /tmp
          - install -m 755 /tmp/terraform /usr/local/bin/terraform
          - terraform version
          - cd /app/cloud-function && zip -r function.zip main.py config.py imap_client.py decryptor.py storage.py queue.py requirements.txt
          - cd /app/asi-one-worker && zip -r function.zip main.py config.py requirements.txt
          - cd /app && cp cloud-function/function.zip terraform/imap-worker.zip && cp asi-one-worker/function.zip terraform/worker.zip
          - cd /app/terraform && terraform init
          - cd /app/terraform && terraform apply -auto-approve