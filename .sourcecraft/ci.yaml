on:
  push:
    - workflows: [deploy-yandex]
      filter:
        branches: [main]
        paths: [terraform/**, cloud-function/**, asi-one-worker/**]

workflows:
  deploy-yandex:
    tasks:
      - terraform-deploy

tasks:
  - name: terraform-deploy
    cubes:
      - name: setup-yc
        image: registry.yandex.net/yandex-cloud/cli:latest
        script:
          - yc version

      - name: configure-yc
        script:
          - yc config set token ${YC_TOKEN}
          - yc config set folder-id ${YC_FOLDER_ID}
          - yc config set cloud-id ${YC_CLOUD_ID}

      - name: create-function-packages
        script:
          - cd cloud-function && zip -r function.zip . -x "*.pyc" "__pycache__/*"
          - cd ../asi-one-worker && zip -r function.zip . -x "*.pyc" "__pycache__/*"
          - mv cloud-function/function.zip terraform/
          - mv asi-one-worker/function.zip terraform/

      - name: terraform-init
        script:
          - cd terraform && terraform init

      - name: terraform-apply
        script:
          - cd terraform && terraform apply -auto-approve -var "token=${YC_TOKEN}" -var "imap_password=${IMAP_PASSWORD}" -var "shared_secret=${SHARED_SECRET}" -var "asi_one_key=${ASI_ONE_KEY}"